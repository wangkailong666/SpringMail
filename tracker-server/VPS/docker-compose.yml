services:
  tracker:
    build: .
    container_name: novamail-tracker
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - DATA_DIR=/app/data
      - STATS_API_TOKEN=${STATS_API_TOKEN:-}
    volumes:
      - tracker-data:/app/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s

volumes:
  tracker-data: